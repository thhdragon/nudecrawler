#
# nudecrawler config
#

verbose = true
unbuffered = true

[depth]
days = 180
fails = 5
lookahead = 16

[filter]
all = false
expr = "(total_images>5 and new_nude_images>0) or total_video>0"
total = 1
max-errors = 5
min-content-length = 0

[detect]
# detect = "mudepy"
detect = "falconsai"
extensions = [
  ".jpeg",
  ".jpg",
  ".png",
  ".webp",
  ".bmp",
  ".tiff",
  ".gif",
  ".heic",
  ".heif"
]
# min size of picture in kb to analyse
minsize = 10

[detector]
detect-image = ""
detect-url = ""

[cache]
# Path to cache file (in json format)
# cache =
# cache-save = 1000

cache = "/tmp/nccache.json"
cache-save = 1

[longrun]
workdir = "/tmp/"
log = "nudecrawler.jsonl"
# wordlist = null
stats = "nudecrawler-stats.txt"
# stop = null
# refresh = null
